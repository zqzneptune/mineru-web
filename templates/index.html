<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinerU Web Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.2rem;
        }
        /* File Explorer Layout */
        .explorer-container {
            display: flex;
            height: calc(100vh - 56px);
            overflow: hidden;
        }
        /* Left Panel - Folder Tree */
        .folder-tree-panel {
            width: 350px;
            min-width: 280px;
            background: white;
            border-right: 1px solid #dee2e6;
            overflow-y: auto;
            padding: 10px;
        }
        .tree-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 10px;
        }
        .tree-item {
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            user-select: none;
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            overflow: hidden;
        }
        .tree-item:hover {
            background-color: #f8f9fa;
        }
        .tree-item.active {
            background-color: #e7f1ff;
            color: #0d6efd;
        }
        .tree-item.folder {
            font-weight: 500;
        }
        .tree-item .bi {
            margin-right: 5px;
            flex-shrink: 0;
        }
        .tree-item .tree-toggle {
            flex-shrink: 0;
        }
        .tree-item-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }
        .tree-item-name:hover {
            overflow: visible;
            white-space: normal;
            word-break: break-all;
        }
        .tree-children {
            padding-left: 20px;
        }
        .tree-toggle {
            cursor: pointer;
            margin-right: 5px;
            width: 16px;
            display: inline-block;
        }
        /* Right Panel - Content Viewer */
        .content-panel {
            flex: 1;
            background: white;
            overflow: auto;
            padding: 20px;
        }
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 15px;
        }
        .content-viewer {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            min-height: 400px;
        }
        .file-content {
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            overflow: auto;
            max-height: calc(100vh - 250px);
        }
        .file-content.json {
            background: #fafafa;
            color: #333;
        }
        .file-content.image {
            background: white;
            text-align: center;
        }
        .file-content.image img {
            max-width: 100%;
            max-height: calc(100vh - 280px);
            object-fit: contain;
        }
        .file-content.pdf {
            background: #f0f0f0;
            padding: 40px;
            text-align: center;
        }
        .file-actions {
            display: flex;
            gap: 10px;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6c757d;
        }
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        /* Upload Button */
        .upload-btn-fixed {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 1000;
            transition: transform 0.2s;
        }
        .upload-btn-fixed:hover {
            transform: scale(1.1);
        }
        /* Status Badge */
        .status-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 500;
        }
        .status-pending { background: #ffc107; color: #000; }
        .status-processing { background: #0dcaf0; color: #fff; }
        .status-completed { background: #198754; color: #fff; }
        .status-failed { background: #dc3545; color: #fff; }
        /* Popup Window Styles */
        .popup-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
        }
        .popup-window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            max-width: 95%;
            max-height: 90vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .popup-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .popup-header h5 {
            margin: 0;
        }
        .popup-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        .popup-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .popup-footer {
            padding: 15px 20px;
            border-top: 1px solid #dee2e6;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        /* Upload Area */
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }
        .upload-area.dragover {
            background: #f0edff;
            border-color: #764ba2;
        }
        /* Log Console */
        .log-console {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 15px;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .log-console .log-info { color: #4fc3f7; }
        .log-console .log-success { color: #66bb6a; }
        .log-console .log-error { color: #ef5350; }
        .log-console .log-warning { color: #ffca28; }
        /* Processing Status */
        .processing-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
        }
        /* Resize Handle */
        .resize-handle {
            width: 6px;
            background: transparent;
            cursor: col-resize;
            position: relative;
            transition: background-color 0.2s;
            flex-shrink: 0;
        }
        .resize-handle::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 100%;
            width: 2px;
            background: #dee2e6;
            transition: background-color 0.2s;
        }
        .resize-handle:hover::after,
        .resize-handle.active::after {
            background: #667eea;
        }
        .resize-handle:hover,
        .resize-handle.active {
            background: rgba(102, 126, 234, 0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-file-earmark-text me-2"></i>MinerU Web Interface
            </span>
        </div>
    </nav>

    <div class="explorer-container">
        <!-- Left Panel - Folder Tree -->
        <div class="folder-tree-panel" id="folderTreePanel">
            <div class="tree-header">
                <h6 class="mb-0"><i class="bi bi-folder me-2"></i>Processed Documents</h6>
                <button class="btn btn-sm btn-outline-secondary" onclick="refreshTree()">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
            <div id="folderTree">
                <div class="text-center text-muted py-4">
                    <i class="bi bi-folder2-open d-block mb-2" style="font-size: 2rem;"></i>
                    No documents processed yet
                </div>
            </div>
        </div>

        <!-- Resize Handle -->
        <div class="resize-handle" id="resizeHandle"></div>

        <!-- Right Panel - Content Viewer -->
        <div class="content-panel">
            <div id="contentView">
                <div class="empty-state">
                    <i class="bi bi-file-earmark"></i>
                    <h5>Select a file to preview</h5>
                    <p class="text-muted">Click on any file in the folder tree to view its contents</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Fixed Upload Button -->
    <button class="upload-btn-fixed" onclick="openUploadPopup()" title="Upload PDF">
        <i class="bi bi-plus"></i>
    </button>

    <!-- Popup Container -->
    <div class="popup-container" id="popupContainer">
        <div class="popup-window">
            <div class="popup-header">
                <h5><i class="bi bi-cloud-upload me-2"></i>Upload & Process PDF</h5>
                <button class="popup-close" onclick="closePopup()">&times;</button>
            </div>
            <div class="popup-body">
                <!-- Upload Form -->
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" name="file" accept=".pdf" style="display: none;">
                    <i class="bi bi-file-earmark-pdf d-block mb-2" style="font-size: 2rem; color: #667eea;"></i>
                    <p class="mb-1">Click to select or drag and drop a PDF file</p>
                    <p class="text-muted small mb-0" id="fileName">No file selected</p>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Backend</label>
                        <select class="form-select" name="backend" id="backendSelect">
                            <option value="hybrid-auto-engine" selected>hybrid-auto-engine (Recommended)</option>
                            <option value="pipeline">pipeline (CPU compatible)</option>
                            <option value="vlm-auto-engine">vlm-auto-engine (High accuracy)</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Language</label>
                        <select class="form-select" name="lang" id="langSelect">
                            <option value="ch" selected>Chinese</option>
                            <option value="en">English</option>
                            <option value="latin">Latin</option>
                            <option value="korean">Korean</option>
                            <option value="japanese">Japanese</option>
                        </select>
                    </div>
                </div>

                <!-- Processing Status -->
                <div class="processing-status" id="processingStatus" style="display: none;">
                    <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                    <span id="statusText">Processing...</span>
                </div>

                <!-- Log Console -->
                <div class="log-console" id="logConsole" style="display: none;"></div>
            </div>
            <div class="popup-footer">
                <button type="button" class="btn btn-secondary" onclick="closePopup()">Close</button>
                <button type="button" class="btn btn-primary" id="uploadBtn" onclick="uploadFile()" disabled>
                    <span class="spinner-border spinner-border-sm me-2" role="status" id="uploadSpinner" style="display: none;"></span>
                    Upload & Process
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentDocId = null;
        let eventSource = null;
        let selectedFile = null;

        // Panel Resize Functionality
        const resizeHandle = document.getElementById('resizeHandle');
        const folderTreePanel = document.getElementById('folderTreePanel');
        let isResizing = false;
        let startX = 0;
        let startWidth = 0;

        resizeHandle.addEventListener('mousedown', function(e) {
            isResizing = true;
            startX = e.clientX;
            startWidth = folderTreePanel.offsetWidth;
            resizeHandle.classList.add('active');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (!isResizing) return;
            
            const diff = e.clientX - startX;
            const newWidth = startWidth + diff;
            
            // Apply min and max constraints
            const minWidth = 280;
            const maxWidth = window.innerWidth - 400; // Leave at least 400px for right panel
            
            if (newWidth >= minWidth && newWidth <= maxWidth) {
                folderTreePanel.style.width = newWidth + 'px';
            }
        });

        document.addEventListener('mouseup', function() {
            if (isResizing) {
                isResizing = false;
                resizeHandle.classList.remove('active');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            refreshTree();
        });

        // Folder Tree Functions
        async function refreshTree() {
            try {
                const response = await fetch('/folder-tree');
                const tree = await response.json();
                renderTree(tree);
            } catch (error) {
                console.error('Error loading folder tree:', error);
            }
        }

        function renderTree(tree) {
            const container = document.getElementById('folderTree');
            
            if (!tree || tree.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-muted py-4">
                        <i class="bi bi-folder2-open d-block mb-2" style="font-size: 2rem;"></i>
                        No documents processed yet
                    </div>
                `;
                return;
            }

            let html = '';
            tree.forEach(doc => {
                html += renderTreeItem(doc, 0);
            });
            container.innerHTML = html;
        }

        function renderTreeItem(item, level) {
            let html = '';
            const paddingLeft = level * 15 + 'px';
            
            if (item.type === 'folder') {
                // Check if it's a root document folder (has id property)
                const isRootFolder = item.id !== undefined;
                const zipButton = isRootFolder ? `
                    <a href="/download-zip/${item.id}" class="btn btn-sm btn-outline-secondary ms-2" 
                       onclick="event.stopPropagation()" title="Download as ZIP" download>
                        <i class="bi bi-file-zip"></i>
                    </a>
                ` : '';
                
                html += `
                    <div class="tree-item folder" style="padding-left: ${paddingLeft}" onclick="toggleFolder(this)">
                        <span class="tree-toggle"><i class="bi bi-chevron-right"></i></span>
                        <i class="bi bi-folder-fill text-warning"></i>
                        <span class="tree-item-name" title="${item.name}">${item.name}</span>
                        <span class="badge bg-secondary ms-2" style="font-size: 0.7em;">${item.children ? countFiles(item.children) : 0}</span>
                        ${zipButton}
                    </div>
                `;
                if (item.children && item.children.length > 0) {
                    html += `<div class="tree-children" style="display: none;">`;
                    item.children.forEach(child => {
                        html += renderTreeItem(child, level + 1);
                    });
                    html += `</div>`;
                }
            } else {
                const icon = getFileIcon(item.ext);
                const size = formatFileSize(item.size);
                html += `
                    <div class="tree-item" style="padding-left: ${paddingLeft}" onclick="viewFile('${item.path.replace(/\\/g, '\\\\')}', '${item.name}', '${item.ext}')">
                        <span class="tree-toggle"></span>
                        <i class="${icon}"></i>
                        <span class="tree-item-name" title="${item.name}">${item.name}</span>
                        <span class="text-muted small ms-2">${size}</span>
                        <div class="file-actions ms-auto" onclick="event.stopPropagation()">
                            <a href="/download-file?path=${encodeURIComponent(item.path)}" class="btn btn-sm btn-outline-primary" download title="Download">
                                <i class="bi bi-download"></i>
                            </a>
                        </div>
                    </div>
                `;
            }
            return html;
        }

        function getFileIcon(ext) {
            const icons = {
                '.md': 'bi bi-file-earmark-markdown text-success',
                '.json': 'bi bi-file-earmark-code text-info',
                '.pdf': 'bi bi-file-earmark-pdf text-danger',
                '.jpg': 'bi bi-file-earmark-image text-purple',
                '.jpeg': 'bi bi-file-earmark-image text-purple',
                '.png': 'bi bi-file-earmark-image text-purple',
                '.gif': 'bi bi-file-earmark-image text-purple',
                '.bmp': 'bi bi-file-earmark-image text-purple',
                '.webp': 'bi bi-file-earmark-image text-purple',
                '.txt': 'bi bi-file-earmark-text'
            };
            return icons[ext] || 'bi bi-file-earmark';
        }

        function countFiles(children) {
            let count = 0;
            for (const child of children) {
                if (child.type === 'file') {
                    count++;
                } else if (child.children) {
                    count += countFiles(child.children);
                }
            }
            return count;
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function toggleFolder(element) {
            const children = element.nextElementSibling;
            const toggle = element.querySelector('.tree-toggle i');
            
            if (children && children.classList.contains('tree-children')) {
                if (children.style.display === 'none') {
                    children.style.display = 'block';
                    toggle.classList.remove('bi-chevron-right');
                    toggle.classList.add('bi-chevron-down');
                } else {
                    children.style.display = 'none';
                    toggle.classList.remove('bi-chevron-down');
                    toggle.classList.add('bi-chevron-right');
                }
            }
        }

        // Store file content globally for copy functionality
        let currentFileContent = '';
        
        // File Content Viewer
        async function viewFile(path, name, ext) {
            selectedFile = { path, name, ext };
            
            // Highlight selected item
            document.querySelectorAll('.tree-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.tree-item').classList.add('active');

            const contentView = document.getElementById('contentView');
            contentView.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';

            try {
                const response = await fetch('/file-content?path=' + encodeURIComponent(path));
                const data = await response.json();

                if (data.error) {
                    contentView.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                    return;
                }

                let contentHtml = '';
                
                if (data.ext === '.json') {
                    try {
                        const formatted = JSON.stringify(JSON.parse(data.content), null, 2);
                        currentFileContent = formatted;
                        contentHtml = `<pre class="file-content json" id="fileContentPre">${escapeHtml(formatted)}</pre>`;
                    } catch {
                        currentFileContent = data.content;
                        contentHtml = `<pre class="file-content" id="fileContentPre">${escapeHtml(data.content)}</pre>`;
                    }
                } else if (['.jpg', '.jpeg', '.png', '.gif', '.bmp', '.webp'].includes(data.ext)) {
                    contentHtml = `
                        <div class="content-header">
                            <h5 class="mb-0">${data.name}</h5>
                            <div class="file-actions">
                                <a href="/download-file?path=${encodeURIComponent(path)}" class="btn btn-primary" download>
                                    <i class="bi bi-download me-1"></i> Download
                                </a>
                            </div>
                        </div>
                        <div class="content-viewer">
                            <div class="file-content image">
                                <img src="/view-image?path=${encodeURIComponent(path)}" alt="${data.name}">
                            </div>
                        </div>
                    `;
                    contentView.innerHTML = contentHtml;
                    return;
                } else if (data.ext === '.pdf') {
                    // PDF viewer using embed
                    const pdfUrl = '/view-pdf?path=' + encodeURIComponent(path);
                    contentHtml = `
                        <div class="content-header">
                            <h5 class="mb-0">${data.name}</h5>
                            <div class="file-actions">
                                <a href="/download-file?path=${encodeURIComponent(path)}" class="btn btn-primary" download>
                                    <i class="bi bi-download me-1"></i> Download
                                </a>
                            </div>
                        </div>
                        <div class="content-viewer">
                            <div class="file-content pdf-viewer">
                                <embed src="${pdfUrl}" type="application/pdf" width="100%" height="600px" />
                            </div>
                        </div>
                    `;
                    contentView.innerHTML = contentHtml;
                    return;
                } else if (data.is_binary) {
                    contentHtml = `
                        <div class="content-header">
                            <h5 class="mb-0">${data.name}</h5>
                            <div class="file-actions">
                                <a href="/download-file?path=${encodeURIComponent(path)}" class="btn btn-primary" download>
                                    <i class="bi bi-download me-1"></i> Download
                                </a>
                            </div>
                        </div>
                        <div class="content-viewer">
                            <div class="file-content text-center">
                                <i class="bi bi-file-earmark" style="font-size: 4rem; color: #6c757d;"></i>
                                <p class="mt-3">Binary file - preview not available</p>
                            </div>
                        </div>
                    `;
                    contentView.innerHTML = contentHtml;
                    return;
                } else {
                    currentFileContent = data.content;
                    contentHtml = `<pre class="file-content" id="fileContentPre">${escapeHtml(data.content)}</pre>`;
                }

                contentView.innerHTML = `
                    <div class="content-header">
                        <h5 class="mb-0">${data.name}</h5>
                        <div class="file-actions">
                            <span class="text-muted me-3">${formatFileSize(data.size)}</span>
                            <button class="btn btn-outline-secondary me-2" onclick="copyAllContent()">
                                <i class="bi bi-clipboard me-1"></i> Copy All
                            </button>
                            <a href="/download-file?path=${encodeURIComponent(path)}" class="btn btn-primary" download>
                                <i class="bi bi-download me-1"></i> Download
                            </a>
                        </div>
                    </div>
                    <div class="content-viewer">
                        ${contentHtml}
                    </div>
                `;
            } catch (error) {
                contentView.innerHTML = `<div class="alert alert-danger">Error loading file: ${error.message}</div>`;
            }
        }
        
        // Copy all content to clipboard
        function copyAllContent() {
            if (!currentFileContent) {
                showToast('No content to copy', 'warning');
                return;
            }
            
            navigator.clipboard.writeText(currentFileContent).then(() => {
                showToast('Content copied to clipboard!', 'success');
            }).catch(err => {
                console.error('Failed to copy:', err);
                showToast('Failed to copy content', 'danger');
            });
        }
        
        // Toast notification function
        function showToast(message, type = 'info') {
            // Remove existing toasts
            const existingToasts = document.querySelectorAll('.toast-container');
            existingToasts.forEach(t => t.remove());
            
            const toast = document.createElement('div');
            toast.className = `toast-container position-fixed top-0 end-0 m-3`;
            toast.innerHTML = `
                <div class="toast show" role="alert">
                    <div class="toast-header bg-${type} text-white">
                        <strong class="me-auto">Notification</strong>
                        <button type="button" class="btn-close" onclick="this.parentElement.parentElement.parentElement.remove()"></button>
                    </div>
                    <div class="toast-body">
                        ${message}
                    </div>
                </div>
            `;
            document.body.appendChild(toast);
            
            // Auto hide after 3 seconds
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function escapeHtml(text) {
            const map = {
                '&': '&',
                '<': '<',
                '>': '>',
                '"': '"',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Popup Functions
        function openUploadPopup() {
            document.getElementById('popupContainer').style.display = 'block';
            resetPopup();
        }

        function closePopup() {
            document.getElementById('popupContainer').style.display = 'none';
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            // Refresh the main window tree after closing
            refreshTree();
        }

        function resetPopup() {
            document.getElementById('fileInput').value = '';
            document.getElementById('fileName').textContent = 'No file selected';
            document.getElementById('uploadBtn').disabled = true;
            document.getElementById('processingStatus').style.display = 'none';
            document.getElementById('logConsole').style.display = 'none';
            document.getElementById('logConsole').innerHTML = '';
            currentDocId = null;
        }

        // File Input Handling
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                updateFileName();
            }
        });
        
        fileInput.addEventListener('change', updateFileName);

        function updateFileName() {
            if (fileInput.files.length) {
                document.getElementById('fileName').textContent = fileInput.files[0].name;
                document.getElementById('uploadBtn').disabled = false;
            } else {
                document.getElementById('fileName').textContent = 'No file selected';
                document.getElementById('uploadBtn').disabled = true;
            }
        }

        // Upload Function
        async function uploadFile() {
            if (!fileInput.files.length) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('backend', document.getElementById('backendSelect').value);
            formData.append('lang', document.getElementById('langSelect').value);

            document.getElementById('uploadBtn').disabled = true;
            document.getElementById('uploadSpinner').style.display = 'inline-block';
            document.getElementById('processingStatus').style.display = 'flex';
            document.getElementById('logConsole').style.display = 'block';

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                
                if (response.ok) {
                    currentDocId = result.doc_id;
                    document.getElementById('statusText').textContent = 'Processing...';
                    startLogStream(currentDocId);
                    pollTaskStatus(currentDocId);
                } else {
                    alert('Error: ' + result.error);
                    document.getElementById('uploadBtn').disabled = false;
                }
            } catch (error) {
                alert('Upload failed: ' + error.message);
                document.getElementById('uploadBtn').disabled = false;
            } finally {
                document.getElementById('uploadSpinner').style.display = 'none';
            }
        }

        // Log Streaming
        function appendLog(message) {
            const console = document.getElementById('logConsole');
            const line = document.createElement('div');
            
            if (message.includes('ERROR') || message.includes('Error')) {
                line.className = 'log-error';
            } else if (message.includes('WARNING') || message.includes('Warning')) {
                line.className = 'log-warning';
            } else if (message.includes('completed') || message.includes('success')) {
                line.className = 'log-success';
            } else {
                line.className = 'log-info';
            }
            
            line.textContent = message;
            console.appendChild(line);
            console.scrollTop = console.scrollHeight;
        }

        function startLogStream(docId) {
            if (eventSource) {
                eventSource.close();
            }

            const console = document.getElementById('logConsole');
            console.innerHTML = '';

            eventSource = new EventSource(`/logs/${docId}`);
            
            eventSource.onmessage = (e) => {
                appendLog(e.data);
            };

            eventSource.onerror = () => {
                eventSource.close();
            };
        }

        // Poll Task Status
        function pollTaskStatus(docId) {
            const pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/task-status/${docId}`);
                    const data = await response.json();
                    
                    if (data.status === 'completed') {
                        clearInterval(pollInterval);
                        document.getElementById('statusText').textContent = 'Completed!';
                        document.getElementById('statusText').className = 'text-success';
                        
                        // Auto close popup after 2 seconds
                        setTimeout(() => {
                            closePopup();
                        }, 2000);
                    } else if (data.status === 'failed') {
                        clearInterval(pollInterval);
                        document.getElementById('statusText').textContent = 'Failed: ' + (data.error_message || 'Unknown error');
                        document.getElementById('statusText').className = 'text-danger';
                        document.getElementById('uploadBtn').disabled = false;
                    }
                } catch (error) {
                    console.error('Error polling task status:', error);
                }
            }, 2000);
        }
    </script>
</body>
</html>
