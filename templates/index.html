<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinerU Web Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #f5f5f5; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 0.5rem 1rem; }
        .explorer-container { display: flex; height: calc(100vh - 56px); overflow: hidden; }
        
        /* Left Panel */
        .folder-tree-panel { width: 350px; min-width: 280px; background: white; border-right: 1px solid #dee2e6; overflow-y: auto; padding: 10px; }
        .tree-header { display: flex; flex-direction: column; gap: 10px; padding: 10px; border-bottom: 1px solid #dee2e6; margin-bottom: 10px; }
        .tree-header-row { display: flex; justify-content: space-between; align-items: center; }
        .search-input { width: 100%; padding: 6px 10px; border: 1px solid #dee2e6; border-radius: 4px; font-size: 13px; }
        
        .tree-item { cursor: pointer; padding: 5px 10px; border-radius: 4px; user-select: none; display: flex; align-items: center; overflow: hidden; }
        .tree-item:hover { background-color: #f8f9fa; }
        .tree-item.active { background-color: #e7f1ff; color: #0d6efd; }
        .tree-item-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        .tree-children { padding-left: 20px; }
        .tree-toggle { cursor: pointer; margin-right: 5px; width: 16px; display: inline-block; }
        .tree-actions { display: flex; gap: 4px; margin-left: auto; }
        .tree-action-btn { padding: 2px 6px; font-size: 12px; opacity: 0; transition: opacity 0.2s; }
        .tree-item:hover .tree-action-btn { opacity: 1; }

        /* Right Panel */
        .content-panel { flex: 1; background: white; overflow: auto; padding: 20px; }
        .content-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #dee2e6; margin-bottom: 15px; }
        .content-viewer { background: #f8f9fa; border-radius: 8px; padding: 20px; min-height: 400px; }
        
        .file-content { white-space: pre-wrap; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.5; background: #1e1e1e; color: #d4d4d4; padding: 20px; border-radius: 8px; overflow: auto; max-height: calc(100vh - 250px); }
        .file-content.json { background: #fafafa; color: #333; }
        .file-content.markdown { background: white; color: #333; padding: 30px; border: 1px solid #dee2e6; }
        .file-content.image img { max-width: 100%; max-height: calc(100vh - 280px); object-fit: contain; }
        
        /* Floating Buttons & Popups */
        .upload-btn-fixed { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 1000; }
        .popup-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; }
        .popup-window { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 700px; max-width: 95%; max-height: 90vh; background: white; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .popup-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 20px; display: flex; justify-content: space-between; }
        .popup-body { flex: 1; overflow-y: auto; padding: 20px; }
        
        .upload-area { border: 2px dashed #667eea; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 15px; }
        .log-console { background: #1e1e1e; color: #d4d4d4; font-family: monospace; font-size: 12px; padding: 15px; border-radius: 8px; max-height: 300px; overflow-y: auto; }
        .log-error { color: #ef5350; }
        .log-warning { color: #ffca28; }
        .log-success { color: #66bb6a; }
        .hidden { display: none !important; }
        
        /* Resize Handle */
        .resize-handle { width: 6px; cursor: col-resize; background: transparent; transition: 0.2s; flex-shrink: 0; }
        .resize-handle:hover { background: rgba(102, 126, 234, 0.2); }
        .resize-handle.dragging { background: rgba(102, 126, 234, 0.4); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid"><span class="navbar-brand mb-0 h1"><i class="bi bi-file-earmark-text me-2"></i>MinerU Web Interface</span></div>
    </nav>

    <div class="explorer-container">
        <div class="folder-tree-panel" id="folderTreePanel">
            <div class="tree-header">
                <div class="tree-header-row">
                    <h6 class="mb-0">Processed Documents</h6>
                    <button class="btn btn-sm btn-outline-secondary" onclick="refreshTree()"><i class="bi bi-arrow-clockwise"></i></button>
                </div>
                <input type="text" class="search-input" id="treeSearch" placeholder="Search documents..." oninput="filterTree()">
            </div>
            <div id="folderTree"></div>
        </div>

        <div class="resize-handle" id="resizeHandle"></div>

        <div class="content-panel">
            <div id="contentView">
                <div class="empty-state text-center py-5 text-muted">
                    <i class="bi bi-file-earmark" style="font-size: 4rem;"></i>
                    <h5>Select a file to preview</h5>
                </div>
            </div>
        </div>
    </div>

    <button class="upload-btn-fixed" onclick="openUploadPopup()"><i class="bi bi-plus"></i></button>

    <!-- Upload Popup -->
    <div class="popup-container" id="popupContainer">
        <div class="popup-window">
            <div class="popup-header"><h5>Upload PDF</h5><button class="btn-close btn-close-white" onclick="closePopup()"></button></div>
            <div class="popup-body">
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept=".pdf" style="display: none;">
                    <i class="bi bi-file-earmark-pdf" style="font-size: 2rem; color: #667eea;"></i>
                    <p id="fileName">Click or drag PDF here</p>
                </div>
                <div class="progress mb-3" id="uploadProgress" style="display:none; height: 10px;">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
                <div class="row mb-3">
                    <div class="col"><label class="form-label">Backend</label><select class="form-select" id="backendSelect"><option value="hybrid-auto-engine">hybrid-auto-engine</option><option value="pipeline">pipeline</option></select></div>
                    <div class="col"><label class="form-label">Language</label><select class="form-select" id="langSelect"><option value="ch">Chinese</option><option value="en">English</option></select></div>
                </div>
                <div id="processingStatus" style="display:none;" class="mb-2"><span id="statusText">Processing...</span></div>
                <div class="log-console" id="logConsole" style="display:none;"></div>
            </div>
            <div class="popup-footer p-3 border-top text-end">
                <button class="btn btn-primary" id="uploadBtn" onclick="uploadFile()" disabled>Start Processing</button>
            </div>
        </div>
    </div>

    <!-- Logs Modal -->
    <div class="popup-container" id="logsModal">
        <div class="popup-window" style="width: 800px;">
            <div class="popup-header"><h5>Process Logs</h5><button class="btn-close btn-close-white" onclick="closeLogsModal()"></button></div>
            <div class="popup-body"><div class="log-console" id="historicalLogs" style="max-height: 500px;"></div></div>
        </div>
    </div>

    <script>
        let currentFileContent = "";
        let eventSource = null;
        let isResizing = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            refreshTree();
            initResize();
        });

        // Resize functionality for left panel
        function initResize() {
            const resizeHandle = document.getElementById('resizeHandle');
            const folderTreePanel = document.getElementById('folderTreePanel');
            const explorerContainer = document.querySelector('.explorer-container');
            
            resizeHandle.addEventListener('mousedown', (e) => {
                isResizing = true;
                resizeHandle.classList.add('dragging');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                
                const containerRect = explorerContainer.getBoundingClientRect();
                const newWidth = e.clientX - containerRect.left;
                
                // Apply min/max constraints
                if (newWidth >= 200 && newWidth <= 600) {
                    folderTreePanel.style.width = newWidth + 'px';
                }
            });

            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    resizeHandle.classList.remove('dragging');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
        }

        async function refreshTree() {
            const res = await fetch('/folder-tree');
            const tree = await res.json();
            const container = document.getElementById('folderTree');
            container.innerHTML = tree.length ? renderTree(tree) : '<p class="text-center text-muted">No files.</p>';
        }

        function renderTree(items, level = 0) {
            return items.map(item => {
                const padding = level * 15;
                if (item.type === 'folder') {
                    const isRoot = item.id !== undefined;
                    return `
                        <div class="tree-item folder" onclick="toggleFolder(this)">
                            <span class="tree-toggle"><i class="bi bi-chevron-right"></i></span>
                            <i class="bi bi-folder-fill text-warning me-1"></i>
                            <span class="tree-item-name">${item.name}</span>
                            ${isRoot ? `
                                <div class="tree-actions">
                                    <button class="btn btn-sm btn-outline-info tree-action-btn" onclick="event.stopPropagation(); viewLogs(${item.id})"><i class="bi bi-journal-text"></i></button>
                                    <button class="btn btn-sm btn-outline-danger tree-action-btn" onclick="event.stopPropagation(); deleteDoc(${item.id})"><i class="bi bi-trash"></i></button>
                                </div>` : ''}
                        </div>
                        <div class="tree-children" style="display:none">${renderTree(item.children || [], level + 1)}</div>`;
                }
                // Use data attributes instead of inline onclick to properly handle special characters
                const safePath = encodeURIComponent(item.path.replace(/\\/g, '/'));
                const safeName = encodeURIComponent(item.name);
                const safeExt = encodeURIComponent(item.ext);
                return `
                    <div class="tree-item" data-path="${safePath}" data-name="${safeName}" data-ext="${safeExt}" onclick="handleFileClick(this)">
                        <span class="ms-4"><i class="bi bi-file-earmark-text me-1"></i>${item.name}</span>
                    </div>`;
            }).join('');
        }

        // Handle file click with proper escaping
        function handleFileClick(el) {
            const path = decodeURIComponent(el.dataset.path);
            const name = decodeURIComponent(el.dataset.name);
            const ext = decodeURIComponent(el.dataset.ext);
            viewFile(path, name, ext);
        }

        function toggleFolder(el) {
            const children = el.nextElementSibling;
            const icon = el.querySelector('.tree-toggle i');
            const isHidden = children.style.display === 'none';
            children.style.display = isHidden ? 'block' : 'none';
            icon.className = isHidden ? 'bi bi-chevron-down' : 'bi bi-chevron-right';
        }

        async function viewFile(path, name, ext) {
            document.getElementById('contentView').innerHTML = '<div class="text-center py-5"><div class="spinner-border"></div></div>';
            const res = await fetch(`/file-content?path=${encodeURIComponent(path)}`);
            const data = await res.json();
            
            currentFileContent = data.content || ""; // Save raw content for copying
            let html = "";

            if (ext === '.md') {
                html = `<div class="file-content markdown">${marked.parse(data.content)}</div>`;
            } else if (ext === '.json') {
                try { 
                    currentFileContent = JSON.stringify(JSON.parse(data.content), null, 2);
                    html = `<pre class="file-content json">${currentFileContent}</pre>`;
                } catch { html = `<pre class="file-content">${data.content}</pre>`; }
            } else if (['.jpg', '.png', '.jpeg'].includes(ext)) {
                html = `<div class="file-content image text-center"><img src="/view-image?path=${encodeURIComponent(path)}"></div>`;
            } else if (ext === '.pdf') {
                html = `<div class="file-content pdf-viewer" style="height: calc(100vh - 250px);">
                    <iframe src="/view-pdf?path=${encodeURIComponent(path)}" style="width: 100%; height: 100%; border: none;"></iframe>
                </div>`;
            } else {
                html = `<pre class="file-content">${data.content || "No preview available"}</pre>`;
            }

            document.getElementById('contentView').innerHTML = `
                <div class="content-header">
                    <h5 class="mb-0">${name}</h5>
                    <div class="file-actions">
                        <button class="btn btn-sm btn-outline-secondary" onclick="copyContent()"><i class="bi bi-clipboard"></i> Copy All</button>
                        <a href="/download-file?path=${encodeURIComponent(path)}" class="btn btn-sm btn-primary" download><i class="bi bi-download"></i> Download</a>
                    </div>
                </div>
                <div class="content-viewer">${html}</div>`;
        }

        function copyContent() {
            if (!currentFileContent) return alert("Nothing to copy");
            
            // Modern approach
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(currentFileContent).then(() => alert("Copied!"));
            } else {
                // Fallback for non-https
                const textArea = document.createElement("textarea");
                textArea.value = currentFileContent;
                document.body.appendChild(textArea);
                textArea.select();
                try { document.execCommand('copy'); alert("Copied!"); } 
                catch (err) { alert("Failed to copy"); }
                document.body.removeChild(textArea);
            }
        }

        // Upload Logic
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        uploadArea.onclick = () => fileInput.click();
        fileInput.onchange = () => {
            if(fileInput.files[0]) {
                document.getElementById('fileName').innerText = fileInput.files[0].name;
                document.getElementById('uploadBtn').disabled = false;
            }
        };

        function uploadFile() {
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('backend', document.getElementById('backendSelect').value);
            formData.append('lang', document.getElementById('langSelect').value);

            const xhr = new XMLHttpRequest();
            document.getElementById('uploadProgress').style.display = 'block';
            
            xhr.upload.onprogress = (e) => {
                const percent = Math.round((e.loaded / e.total) * 100);
                document.getElementById('progressBar').style.width = percent + '%';
            };

            xhr.onload = () => {
                const res = JSON.parse(xhr.responseText);
                if(xhr.status === 200) {
                    startLogs(res.doc_id);
                    document.getElementById('logConsole').style.display = 'block';
                    document.getElementById('processingStatus').style.display = 'block';
                }
            };
            xhr.open('POST', '/upload');
            xhr.send(formData);
        }

        function startLogs(id) {
            if(eventSource) eventSource.close();
            eventSource = new EventSource(`/logs/${id}`);
            const console = document.getElementById('logConsole');
            eventSource.onmessage = (e) => {
                const div = document.createElement('div');
                div.innerText = e.data;
                console.appendChild(div);
                console.scrollTop = console.scrollHeight;
                if(e.data.includes("completed")) refreshTree();
            };
        }

        function filterTree() {
            const q = document.getElementById('treeSearch').value.toLowerCase();
            document.querySelectorAll('.tree-item').forEach(el => {
                const text = el.innerText.toLowerCase();
                el.classList.toggle('hidden', q && !text.includes(q));
            });
        }

        async function deleteDoc(id) {
            if(!confirm("Delete?")) return;
            await fetch(`/documents/${id}`, { method: 'DELETE' });
            refreshTree();
        }

        async function viewLogs(id) {
            document.getElementById('logsModal').style.display = 'block';
            const res = await fetch(`/documents/${id}/logs`);
            const data = await res.json();
            document.getElementById('historicalLogs').innerText = data.logs ? data.logs.map(l => l.message).join('\n') : "No logs.";
        }

        function openUploadPopup() { document.getElementById('popupContainer').style.display = 'block'; }
        function closePopup() { document.getElementById('popupContainer').style.display = 'none'; if(eventSource) eventSource.close(); }
        function closeLogsModal() { document.getElementById('logsModal').style.display = 'none'; }
    </script>
</body>
</html>
